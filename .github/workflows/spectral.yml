name: spectral

on:
  pull_request:
    branches:
      - main
      - dotnet-vnext
      - dotnet-nightly
  workflow_dispatch:

permissions: {}

jobs:
  spectral:
    runs-on: ubuntu-24.04

    env:
      # renovate: datasource=npm depName=spectral-cli packageName=@stoplight/spectral-cli
      SPECTRAL_CLI_VERSION: '6.16.1'

    permissions:
      contents: read

    steps:

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        filter: 'tree:0'
        persist-credentials: false
        show-progress: false

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24.x'

    - name: Install Spectral
      run: npm install --global "@stoplight/spectral-cli@${SPECTRAL_CLI_VERSION}"

    - name: Generate OpenAPI document
      run: dotnet build ./src/API

    - name: Run Spectral
      run: spectral lint "./artifacts/openapi/*" --fail-severity warn --format github-actions
